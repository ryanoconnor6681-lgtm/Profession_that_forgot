<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Profession That Forgot Its Worth — On $150,000</title>
  <meta name="description" content="An interactive look at what happened to architecture as a profession — and why a 20-year licensed architect earns less than a third-year software engineer.">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #e9e0c8;
      --bg-raised: #f0e8d3;
      --bg-sunken: #ddd2b4;
      --bg-dark: #26201a;
      --text: #2b2521;
      --text-muted: #6b5d4c;
      --text-faint: #a09380;
      --line: #cbbe9c;
      --line-faint: #d8cda9;
      --accent: #a16207;
      --accent-strong: #854d0e;
      --gain: #556b2f;
      --loss: #8a3412;
      --arch: #8a3412;
      --law: #6b5d4c;
      --med: #556b2f;
      --soft: #a16207;
    }
    html, body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .serif { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
    .serif-display { font-variation-settings: "opsz" 144; }
    .serif-text { font-variation-settings: "opsz" 24; letter-spacing: 0.005em; }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .bg-cream { background-color: var(--bg); }
    .bg-cream-raised { background-color: var(--bg-raised); }
    .bg-cream-sunken { background-color: var(--bg-sunken); }
    .bg-dark { background-color: var(--bg-dark); }
    .text-main { color: var(--text); }
    .text-muted { color: var(--text-muted); }
    .text-faint { color: var(--text-faint); }
    .text-accent { color: var(--accent); }
    .text-gain { color: var(--gain); }
    .text-loss { color: var(--loss); }
    .border-line { border-color: var(--line); }
    .border-line-faint { border-color: var(--line-faint); }
    .accent-bg { background-color: var(--accent); }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
    input[type=range]::-webkit-slider-runnable-track { height: 2px; background: var(--text-muted); border-radius: 2px; }
    input[type=range]::-moz-range-track { height: 2px; background: var(--text-muted); border-radius: 2px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--text); margin-top: -8px; border: 2px solid var(--bg); box-shadow: 0 0 0 1px var(--text); }
    input[type=range]::-moz-range-thumb { height: 18px; width: 18px; border-radius: 50%; background: var(--text); border: 2px solid var(--bg); box-shadow: 0 0 0 1px var(--text); }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .draw-in { stroke-dasharray: 2000; stroke-dashoffset: 2000; animation: drawIn 1.6s ease-out forwards; }
    @keyframes drawIn { to { stroke-dashoffset: 0; } }
  </style>
</head>
<body class="bg-cream text-main antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // ============================================================
    // DATA — anchored in BLS May 2024, AIA Compensation 2025-26,
    // NCARB 2024-2025, Levels.fyi 2025, NALP 2025
    // ============================================================

    // The architect anchor — 20-yr licensed architect, AIA Senior Architect band
    const ARCH_ANCHOR = 150_000;

    // Median wages (BLS OEWS May 2024, base salary)
    const ARCH_MEDIAN = 96_690;     // Architects (excl. landscape/naval)
    const LAW_MEDIAN = 151_160;     // Lawyers
    const MED_MEDIAN = 239_200;     // Physicians and surgeons (BLS top-codes; actual higher)
    const SOFT_MEDIAN = 133_080;    // Software developers

    // Senior / 20-year band (AIA Comp Survey + NALP + AAMC + Levels.fyi base)
    const ARCH_SENIOR = 150_000;    // AIA Senior Architect, ~12-20 yr, US median band
    const LAW_SENIOR = 365_000;     // BigLaw senior associate / non-equity partner
    const MED_SENIOR = 350_000;     // Mid-career attending physician, family medicine ~$240K, surgical specialties higher
    const SOFT_SENIOR_BASE = 191_000; // Levels.fyi median SWE total comp
    const SOFT_SENIOR_TC = 312_000;   // Levels.fyi Senior median TC

    // Legal history
    const HISTORY = [
      { year: 1857, label: 'AIA founded',            note: '13 architects in NYC create the institute.' },
      { year: 1865, label: 'The 5% precedent',       note: 'Richard Morris Hunt sues a client for nonpayment of his fee. He wins. The 5%-of-construction-cost standard is born.' },
      { year: 1908, label: 'Mandatory fee schedule', note: 'AIA publishes minimum fees. Undercutting becomes an ethics violation. You can lose your license.' },
      { year: 1972, label: 'The consent decree',     note: 'Civil Action 992-72. DOJ ends the fee schedule under the Sherman Antitrust Act. AIA settles, prohibits itself from suggesting fees.', pivot: true },
      { year: 1979, label: 'Mardirosian v. AIA',     note: 'Aram Mardirosian sues after being expelled for "stealing" a project. He wins. The Code of Ethics begins to crack.' },
      { year: 1980, label: 'Code of Ethics withdrawn', note: 'AIA pulls its entire Architectural Code of Ethics rather than face further antitrust exposure.' },
      { year: 1990, label: 'The second decree',      note: 'Halloween 1990. Civil Action 90-1567. AIA enjoined from any direct or indirect restraint on architect pricing — applies to ALL architects, not just members.', pivot: true }
    ];

    // Path to license — NCARB 2024-2025 data
    const PIPELINE = [
      { stage: 'Architecture school',       years: 5.5,  label: '5–7 yr B.Arch or 4-yr pre-prof + M.Arch', pay: 0 },
      { stage: 'AXP (formerly IDP)',         years: 4.9,  label: '3,740 hours under licensed supervision', pay: 58_000 },
      { stage: 'ARE (6 divisions)',          years: 2.5,  label: '$1,260 in exam fees, often overlapping AXP', pay: 65_000 }
    ];

    // Comparison: time to senior-equivalent
    const PATHS = [
      { profession: 'Architect',         color: 'var(--arch)', schoolYears: 5.5, postSchool: 7.8, totalToSenior: 18, license: 13.3, postLicensePay: 96_690, seniorPay: 150_000 },
      { profession: 'Lawyer',            color: 'var(--law)',  schoolYears: 7,   postSchool: 8,   totalToSenior: 15, license: 7,    postLicensePay: 200_000, seniorPay: 365_000 },
      { profession: 'Physician',         color: 'var(--med)',  schoolYears: 8,   postSchool: 5,   totalToSenior: 13, license: 11,   postLicensePay: 75_000,  seniorPay: 350_000 },
      { profession: 'Software engineer', color: 'var(--soft)', schoolYears: 4,   postSchool: 4,   totalToSenior: 8,  license: 0,    postLicensePay: 95_000,  seniorPay: 312_000 }
    ];

    // Where the $100M building's money goes (industry rule-of-thumb percentages)
    const BUILDING_PIE = [
      { who: 'General contractor',  pct: 75,  detail: 'Construction labor, materials, sub-trades' },
      { who: 'Developer / owner',   pct: 12,  detail: 'Captures the appreciation. Owns the asset.' },
      { who: 'Engineering (MEP+S)', pct: 4,   detail: 'Structural, mechanical, electrical, plumbing' },
      { who: 'CM / project mgmt',   pct: 3,   detail: 'Construction management fees' },
      { who: 'Architect',           pct: 6,   detail: '5–8% of construction cost. Capped. No upside.', highlight: true }
    ];

    // Software product comp (illustrative, $100M revenue product, founding/early team)
    const SOFTWARE_PIE = [
      { who: 'Investors / equity',  pct: 60,  detail: 'VC, founders\' shares, post-exit' },
      { who: 'Engineering team',    pct: 25,  detail: 'Equity + base + bonus. Captures product upside.', highlight: true },
      { who: 'GTM / sales',         pct: 10,  detail: 'Commissions, recurring revenue share' },
      { who: 'Operations',          pct: 5,   detail: 'Hosting, support, admin' }
    ];

    // ============================================================
    // FORMATTERS
    // ============================================================
    function formatMoney(n) {
      const sign = n < 0 ? '-' : '';
      const a = Math.abs(n);
      if (a >= 1e9)  return `${sign}$${(a/1e9).toFixed(a >= 1e10 ? 0 : 1)}B`;
      if (a >= 1e6)  return `${sign}$${(a/1e6).toFixed(a >= 1e7 ? 0 : 1)}M`;
      if (a >= 1e3)  return `${sign}$${(a/1e3).toFixed(0)}K`;
      return `${sign}$${Math.round(a).toLocaleString()}`;
    }
    function formatFull(n) {
      return `${n < 0 ? '-' : ''}$${Math.round(Math.abs(n)).toLocaleString()}`;
    }

    // ============================================================
    // SHARED UI
    // ============================================================

    function Header({ activeTab, setActiveTab }) {
      const tabs = [
        { n: 1, label: "The Floor" },
        { n: 2, label: "1972" },
        { n: 3, label: "The Pipeline" },
        { n: 4, label: "Roark Tax" },
        { n: 5, label: "Value Leak" },
        { n: 6, label: "What If" },
        { n: 7, label: "Same Disease" },
        { n: 8, label: "The Inheritance" }
      ];
      return (
        <header className="border-b border-line sticky top-0 bg-cream/95 backdrop-blur z-50">
          <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 md:py-4 flex items-center justify-between gap-4">
            <div className="flex items-baseline gap-3 shrink-0">
              <button onClick={() => setActiveTab(1)} className="serif text-lg md:text-xl font-semibold num">$150,000</button>
              <span className="text-xs text-muted hidden xl:inline">The profession that forgot its worth</span>
            </div>
            <nav className="flex items-center gap-0.5 md:gap-1 text-xs overflow-x-auto">
              {tabs.map(t => (
                <button
                  key={t.n}
                  onClick={() => setActiveTab(t.n)}
                  className={`px-2.5 md:px-3 py-1.5 rounded-full whitespace-nowrap transition ${
                    t.n === activeTab ? 'bg-dark text-[var(--bg)]' : 'text-muted hover:text-main'
                  }`}
                >
                  <span className="num mr-1.5 opacity-60">{String(t.n).padStart(2,'0')}</span>
                  <span className="hidden md:inline">{t.label}</span>
                </button>
              ))}
            </nav>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="max-w-4xl mx-auto px-6 py-12 text-xs text-muted space-y-2 border-t border-line-faint mt-10">
          <p>Sources: BLS Occupational Employment and Wage Statistics (May 2024); AIA Compensation &amp; Benefits Report 2025–26; NCARB by the Numbers 2024 &amp; 2025; Levels.fyi End of Year Pay Report 2025; NALP Associate Salary Survey 2025; Peggy Deamer, "The Sherman Antitrust Act and the Profession of Architecture" (Avery Review, 2015); United States v. AIA, Civil Actions 992-72 and 90-1567; Charles Nelson, "B04.01 AIA Consent Decree" (Design Node); New York Review of Architecture, "Antitrust and Architecture: Coordination not Domination."</p>
          <p>Median figures are base salary unless otherwise noted. Total compensation at top tech companies includes equity and bonus. Profession comparisons use BLS OEWS for medians; senior-band figures from industry surveys cited above.</p>
        </footer>
      );
    }

    // ============================================================
    // TAB 01 — THE FLOOR
    // ============================================================

    function Tab01_Hero() {
      return (
        <section className="max-w-4xl mx-auto px-6 pt-16 md:pt-24 pb-10">
          <div className="text-xs uppercase tracking-[0.2em] text-muted mb-6">Tab 01 · The Floor</div>
          <h1 className="serif serif-display text-5xl md:text-7xl lg:text-8xl font-semibold leading-[1.02] tracking-tight mb-10">
            A licensed architect with 20 years of experience earns&nbsp;<span className="num">$150,000</span>.
            <br/>
            <span className="text-faint">A third-year software engineer earns more.</span>
          </h1>
          <div className="space-y-5 text-lg md:text-xl text-muted leading-relaxed max-w-2xl">
            <p>
              The architect is licensed. She has spent <span className="text-main">13 years</span> on the path: a five-to-seven-year degree, 3,740 hours of supervised experience, and six exams. She carries professional liability for the buildings she stamps. The lawyer in her building earns the same. The doctor in the hospital she designed earns <span className="num text-main">$240,000+</span>. The software engineer who graduated college four years ago and has no license, no exam, no bar association, earns <span className="num text-main">$191,000</span>.
            </p>
            <p>
              This is not about talent. It is about how the work is priced. Architecture used to be priced like medicine and law. In 1972, the floor came out, and nobody built another one.
            </p>
          </div>
        </section>
      );
    }

    function Tab01_PullQuote() {
      return (
        <section className="max-w-4xl mx-auto px-6 py-20 md:py-28">
          <p className="serif serif-text text-3xl md:text-5xl leading-[1.15] font-medium">
            The architect designed the office. The lawyer in it earns the same. The doctor across the street earns twice as much. The engineer who built the website on the architect's phone earns&nbsp;<span className="text-accent">double or triple</span> at the senior level.
          </p>
          <p className="serif serif-text text-3xl md:text-5xl leading-[1.15] font-medium mt-4 text-faint">
            All four did roughly the same amount of school.
          </p>
        </section>
      );
    }

    function Tab01_SalaryCurves({ years, setYears }) {
      // Salary curves by years post-graduation. Calibrated to BLS + AIA + AAMC + Levels.fyi.
      // Architect: starts low, plateaus around $150K at 20 yrs (AIA Senior Architect band)
      // Lawyer: starts $200K BigLaw, partner track to $450K+ at 15-20 yrs
      // Physician: starts $65K residency, jumps to $250K at attending (~yr 7-8), grows to $400K
      // Software: starts $95K, $312K at senior (5-8 yrs), $457K at staff (8-12 yrs)
      function archAt(y) {
        if (y < 0) return 0;
        if (y <= 4) return 58_000 + y * 5_000;            // $58K → $78K (unlicensed AXP)
        if (y <= 8) return 78_000 + (y - 4) * 6_000;      // licensure step, $78K → $102K
        if (y <= 14) return 102_000 + (y - 8) * 6_000;    // $102K → $138K
        if (y <= 25) return 138_000 + (y - 14) * 1_500;   // plateau into senior, $138K → $154K
        return 154_000;
      }
      function lawAt(y) {
        if (y < 0) return 0;
        if (y <= 1) return 200_000;
        if (y <= 8) return 200_000 + (y - 1) * 25_000;    // associate ladder, $200K → $375K
        if (y <= 15) return 375_000 + (y - 8) * 25_000;   // partner track, $375K → $550K
        return 550_000;
      }
      function medAt(y) {
        if (y < 0) return 0;
        if (y <= 4) return 65_000 + y * 2_000;            // residency $65K → $73K
        if (y <= 7) return 73_000 + (y - 4) * 60_000;     // jump to attending $73K → $253K
        if (y <= 18) return 253_000 + (y - 7) * 12_000;   // $253K → $385K
        return 385_000;
      }
      function softAt(y) {
        if (y < 0) return 0;
        if (y <= 2) return 95_000 + y * 25_000;           // junior, $95K → $145K
        if (y <= 5) return 145_000 + (y - 2) * 55_000;    // mid → senior, $145K → $310K
        if (y <= 9) return 310_000 + (y - 5) * 36_000;    // staff, $310K → $454K
        if (y <= 15) return 454_000 + (y - 9) * 25_000;   // principal, $454K → $604K
        return 604_000;
      }

      const w = 700, h = 380, pad = { l: 60, r: 20, t: 30, b: 40 };
      const xMax = 25, yMax = 700_000;
      const xScale = (x) => pad.l + (x / xMax) * (w - pad.l - pad.r);
      const yScale = (y) => h - pad.b - (y / yMax) * (h - pad.t - pad.b);

      function path(fn) {
        const pts = [];
        for (let x = 0; x <= xMax; x += 0.5) {
          pts.push(`${xScale(x)},${yScale(fn(x))}`);
        }
        return 'M' + pts.join(' L');
      }

      const lines = [
        { name: 'Software engineer', fn: softAt, color: 'var(--soft)', dash: '0' },
        { name: 'Physician',         fn: medAt,  color: 'var(--med)',  dash: '0' },
        { name: 'Lawyer',            fn: lawAt,  color: 'var(--law)',  dash: '0' },
        { name: 'Architect',         fn: archAt, color: 'var(--arch)', dash: '0' }
      ];

      const yTicks = [0, 100_000, 200_000, 300_000, 400_000, 500_000, 600_000, 700_000];
      const xTicks = [0, 5, 10, 15, 20, 25];

      const atYear = lines.map(l => ({ ...l, value: l.fn(years) }))
                          .sort((a, b) => b.value - a.value);

      return (
        <section className="bg-cream-sunken border-y border-line py-16 md:py-20">
          <div className="max-w-5xl mx-auto px-6">
            <div className="text-xs uppercase tracking-[0.2em] text-muted mb-3">Same school, different floor</div>
            <h2 className="serif text-3xl md:text-4xl font-semibold tracking-tight mb-4 max-w-2xl">Move the slider. Watch the gap open.</h2>
            <p className="text-muted max-w-2xl mb-8">
              Each line is base salary by years since graduating undergrad. The architect curve goes flat after year 14. The other three keep climbing. By year 20, the licensed architect earns less than every other comparison line — including the one with no license at all.
            </p>

            <div className="bg-cream-raised border border-line-faint rounded-sm p-4 md:p-6 mb-6">
              <div className="flex items-baseline justify-between mb-3">
                <span className="text-sm text-muted">years since undergrad</span>
                <span className="serif text-3xl md:text-4xl font-semibold num tracking-tight">{years}</span>
              </div>
              <input type="range" min="0" max="25" step="1" value={years} onChange={e => setYears(parseInt(e.target.value))} className="w-full" />
              <div className="flex justify-between text-xs text-muted mt-2 num">
                <span>0</span><span>5</span><span>10</span><span>15</span><span>20</span><span>25</span>
              </div>
            </div>

            <div className="bg-cream-raised border border-line-faint rounded-sm p-4 md:p-6 overflow-hidden">
              <svg viewBox={`0 0 ${w} ${h}`} className="w-full" preserveAspectRatio="xMidYMid meet">
                {/* Y grid */}
                {yTicks.map(t => (
                  <g key={t}>
                    <line x1={pad.l} x2={w - pad.r} y1={yScale(t)} y2={yScale(t)} stroke="var(--line-faint)" strokeWidth="1"/>
                    <text x={pad.l - 8} y={yScale(t) + 4} fontSize="11" fill="var(--text-muted)" textAnchor="end" className="num">{formatMoney(t)}</text>
                  </g>
                ))}
                {/* X ticks */}
                {xTicks.map(t => (
                  <g key={t}>
                    <text x={xScale(t)} y={h - pad.b + 18} fontSize="11" fill="var(--text-muted)" textAnchor="middle" className="num">{t}</text>
                  </g>
                ))}
                {/* Vertical year line */}
                <line x1={xScale(years)} x2={xScale(years)} y1={pad.t} y2={h - pad.b} stroke="var(--text)" strokeWidth="1" strokeDasharray="3 3" opacity="0.4"/>

                {/* Lines */}
                {lines.map((l, i) => (
                  <path key={i} d={path(l.fn)} fill="none" stroke={l.color} strokeWidth="2.5" className="draw-in" style={{ animationDelay: `${i * 0.15}s` }}/>
                ))}

                {/* Dots at year */}
                {lines.map((l, i) => (
                  <circle key={i} cx={xScale(years)} cy={yScale(l.fn(years))} r="5" fill={l.color} stroke="var(--bg-raised)" strokeWidth="2"/>
                ))}

                {/* X axis label */}
                <text x={(w - pad.r + pad.l) / 2} y={h - 5} fontSize="11" fill="var(--text-muted)" textAnchor="middle">years post-undergrad</text>
              </svg>

              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mt-4 pt-4 border-t border-line-faint">
                {atYear.map((l, i) => (
                  <div key={`${l.name}-${years}`} className="fade-in">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="w-3 h-3 rounded-full" style={{ background: l.color }}></span>
                      <span className="text-xs uppercase tracking-wider text-muted">{l.name}</span>
                    </div>
                    <div className="serif text-xl md:text-2xl font-semibold num">{formatMoney(l.value)}</div>
                  </div>
                ))}
              </div>
            </div>

            <p className="text-xs text-muted italic mt-4 max-w-2xl">
              Sources: BLS OEWS May 2024 (medians), AIA Compensation Survey 2025–26 (architect bands), NALP 2025 (lawyer associate scale), AAMC + Medscape (physician trajectory), Levels.fyi 2025 (software TC). Base salary only — total compensation at top tech companies adds 50–150% via equity.
            </p>
          </div>
        </section>
      );
    }

    function Tab01_Thesis() {
      const compares = [
        { a: 'Architect',         b: 'Software engineer', archYrs: 20, otherYrs: 4,  archPay: 150_000, otherPay: 191_000, otherLabel: '4 years out of college' },
        { a: 'Architect',         b: 'Lawyer',            archYrs: 20, otherYrs: 7,  archPay: 150_000, otherPay: 200_000, otherLabel: 'first-year BigLaw associate' },
        { a: 'Architect',         b: 'Physician',         archYrs: 20, otherYrs: 12, archPay: 150_000, otherPay: 285_000, otherLabel: 'mid-career attending' }
      ];
      return (
        <section className="max-w-5xl mx-auto px-6 py-16 md:py-20">
          <div className="mb-10">
            <div className="text-xs uppercase tracking-[0.2em] text-muted mb-3">Three comparisons</div>
            <h2 className="serif text-3xl md:text-4xl font-semibold tracking-tight mb-4 max-w-2xl">Each one ends the same way.</h2>
          </div>
          <div className="grid md:grid-cols-3 gap-3">
            {compares.map((c, i) => {
              const ratio = c.otherPay / c.archPay;
              return (
                <div key={i} className="bg-cream-raised border border-line-faint p-5 rounded-sm">
                  <div className="text-xs uppercase tracking-wider text-muted mb-3">{c.a} vs {c.b}</div>
                  <div className="space-y-3">
                    <div>
                      <div className="serif text-xl font-semibold">20-yr licensed architect</div>
                      <div className="num text-2xl serif font-semibold">{formatMoney(c.archPay)}</div>
                    </div>
                    <div className="border-t border-line-faint pt-3">
                      <div className="serif text-xl font-semibold">{c.b}</div>
                      <div className="text-xs text-muted mb-1">{c.otherLabel}</div>
                      <div className="num text-2xl serif font-semibold text-accent">{formatMoney(c.otherPay)}</div>
                    </div>
                  </div>
                  <div className="mt-4 pt-3 border-t border-line-faint text-sm italic">
                    {ratio >= 1 ? `${ratio.toFixed(2)}× the architect's pay` : `${(1/ratio).toFixed(2)}× the architect's pay`}
                  </div>

      const years = 30;

      for (let y = 0; y <= years; y++) {

                <text x={xScale(1972)} y={pad.t - 10} fontSize="11" fill="var(--accent-strong)" textAnchor="middle" fontWeight="600" className="num">1972</text>

                {/* Y grid */}
                {[100, 150, 200, 250, 300].map(t => (
                  <g key={t}>
                    <line x1={pad.l} x2={w - pad.r} y1={yScale(t)} y2={yScale(t)} stroke="var(--line-faint)" strokeWidth="1"/>

                <g>

                  <text x={xScale(2025) - 8} y={yScale(115) + 18} fontSize="11" fill="var(--arch)" fontWeight="600" textAnchor="end">actual: 115</text>
